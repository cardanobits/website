<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name=viewport content="width=device-width, initial-scale=1">
    <!--[if lt IE 9]><script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script><![endif]-->
    <meta http-equiv=X-UA-Compatible content="IE=11">
    <link rel="shortcut icon" type="image/png" href="favicon.png">

    <title>CardanoBits | The first 8-bit pixel art collection on Cardano</title>
    <meta name="description" content="The first 8-bit pixel art collection on the Cardano Blockchain" />

    <!-- Open Graph data -->
    <meta property="og:title" content="CardanoBits" />
    <meta property="og:image" content="logo.png" />
    <meta property="og:description" content="The first 8-bit pixel art collection on the Cardano Blockchain" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="CardanoBits" />
    <meta name="twitter:site" content="@cardanobits" />
    <meta name="twitter:image" content="logo.png" />
    <meta name="twitter:description" content="The first 8-bit pixel art collection on the Cardano Blockchain" />

    <style>
        body { margin: 0; padding: 0; }
        html { height: 100%; cursor: default; }
        body {
            font-family: "Roboto", sans-serif; /* Default font */
            width: 100%; height: 100%;
            text-align: center;
            display: table;
            opacity: 1;
            animation: fadein 3s forwards;
        }
        h2 {
            font-weight: 300;
            margin-bottom: 25px;
        }
        img {
            width: 25%; /* Image width */
            border: 0; /* For IE */
        }
        #main {
            vertical-align: middle;
            display: table-cell;
        }
        /* Fades in animation */
        @keyframes fadein  {
            from { opacity: 0; }
        }


        @media screen and (max-width:600px) {
            img {
                width: 60%;
            }
            h1 {
                font-size: 1.3em;
            }
            h2 {
                margin: 1.1em;
                font-size: 1.1em;
            }
        }
    </style>
    
</head>

<body>
    <div id="main">
        <img src="logo.png" alt="Logo Image">
        <h1>CardanoBits</h1>
        <h2>We are almost done... Keep in touch to get the latests news</h2>
        <h3>hi@cardanobits.art | https://twitter.com/cardanobits</h3>
    </div>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400&display=swap" rel="stylesheet">
</body>
</html>
